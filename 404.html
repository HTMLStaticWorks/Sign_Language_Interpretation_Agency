<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | ClearHands Interpreting</title>
    
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..600&family=Poppins:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body data-theme="dark" class="bg-primary-dark">

    <div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center position-relative overflow-hidden">
        <div id="particles-js" class="position-absolute w-100 h-100 top-0 start-0 z-index-1 opacity-25"></div>
        
        <div class="text-center position-relative z-index-2 fade-up">
            <h1 class="display-1 fw-bold text-primary-accent mb-0" style="text-shadow: 0 0 30px var(--glow-color);">404</h1>
            <h3 class="mb-4 text-white">Page Not Found</h3>
            <p class="text-secondary mb-5 mx-auto" style="max-width: 400px;">It seems the requested address does not exist. Double-check the URL or return to safety.</p>
            
            <a href="index.html" class="btn btn-gradient btn-lg"><i class="bi bi-house-door me-2"></i>Return to Home</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        if(document.getElementById('particles-js')) {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 40 },
                    "color": { "value": "#2DA6A2" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.5 },
                    "size": { "value": 3 },
                    "line_linked": { "enable": true, "distance": 150, "color": "#2DA6A2", "opacity": 0.2, "width": 1 },
                    "move": { "enable": true, "speed": 1 }
                }
            });
        }
    </script>
</body>
</html>
