<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login | ClearHands Interpreting</title>
    
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..600&family=Poppins:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark-mode.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body data-theme="dark" class="bg-primary-dark auth-page">

    <div class="container-fluid p-0 min-vh-100 d-flex flex-column justify-content-center align-items-center py-4">
        
        <!-- Center: Login Form Wrapper -->
        <div class="w-100 px-3" style="max-width: 450px;">
            
            <!-- Toggles -->
            <div class="auth-top-controls d-flex justify-content-end gap-2 mb-3 z-index-3">
                <a href="#" id="rtlToggle" class="btn btn-outline-secondary d-flex align-items-center justify-content-center fw-bold" style="width: 40px; height: 40px; font-size: 0.8rem;" title="Toggle RTL">RTL</a>
                <a href="#" id="themeToggle" class="btn btn-outline-secondary d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;" title="Toggle Theme"><i class="bi bi-sun fs-5"></i></a>
            </div>

            <div class="glass-card p-4 p-md-5 fade-up border-primary neon-border w-100" style="transition-delay: 0.1s;">
                    <div class="text-center mb-4">
                        <a class="navbar-brand justify-content-center mb-2" href="index.html">
                            <img src="assets/logo.svg" alt="ClearHands Logo" style="max-height: 40px; width: auto;">
                        </a>
                        <h4 class="fw-bold mt-3 mb-1">Welcome Back</h4>
                        <p class="text-secondary small mb-0">Sign in to your accessibility portal</p>
                    </div>
                    
                    <form action="index.html">
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control form-control-glass border-start-0" placeholder="client@organization.com" required>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label text-secondary small mb-1">Password</label>
                            <div class="input-group mb-2">
                                <span class="input-group-text bg-transparent border-secondary text-secondary"><i class="bi bi-key"></i></span>
                                <input type="password" id="passwordInput" class="form-control form-control-glass border-start-0 border-end-0" placeholder="••••••••" required>
                                <button class="btn btn-outline-secondary border-secondary border-start-0 bg-transparent text-secondary px-3" type="button" id="togglePassword">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="form-check mb-0">
                                    <input class="form-check-input border-secondary bg-transparent" type="checkbox" id="rememberMe">
                                    <label class="form-check-label text-secondary small" for="rememberMe">Remember me</label>
                                </div>
                                <a href="#" class="small text-decoration-none">Forgot Password?</a>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-gradient w-100 mb-3">Login</button>
                        
                        <div class="d-flex align-items-center my-4">
                            <hr class="flex-grow-1 border-secondary">
                            <span class="mx-3 text-secondary small">Or continue with</span>
                            <hr class="flex-grow-1 border-secondary">
                        </div>
                        
                        <style>
                            .social-btn { transition: all 0.3s ease; color: #a1a1aa; }
                            .social-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(45,166,162,0.2); border-color: #2DA6A2 !important; color: #2DA6A2 !important; }
                        </style>
                        <div class="d-flex gap-2 mb-4">
                            <button type="button" class="btn border border-secondary social-btn flex-grow-1 py-2" title="Google">
                                <i class="bi bi-google"></i>
                            </button>
                            <button type="button" class="btn border border-secondary social-btn flex-grow-1 py-2" title="Apple">
                                <i class="bi bi-apple"></i>
                            </button>
                            <button type="button" class="btn border border-secondary social-btn flex-grow-1 py-2" title="Facebook">
                                <i class="bi bi-facebook"></i>
                            </button>
                        </div>

                        <div class="text-center mt-3">
                            <span class="text-secondary small">Don't have an account? <a href="register.html" class="text-decoration-none">Request Access</a></span>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        if(document.getElementById('particles-js')) {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 30 },
                    "color": { "value": "#2DA6A2" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.5 },
                    "size": { "value": 2 },
                    "line_linked": { "enable": true, "distance": 150, "color": "#2DA6A2", "opacity": 0.2, "width": 1 },
                    "move": { "enable": true, "speed": 1 }
                }
            });
        }

        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#passwordInput');
        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                const icon = this.querySelector('i');
                if (icon) {
                    icon.classList.toggle('bi-eye');
                    icon.classList.toggle('bi-eye-slash');
                }
            });
        }
    </script>
</body>
</html>
